<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpectraMuse — Where stories become color, sound, and motion</title>
<meta name="description" content="SpectraMuse turns written stories into moving color, texture, and sound so creators can record and share living story performances." />
<link rel="canonical" href="https://spectramuse.com/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="SpectraMuse" />
<meta property="og:title" content="SpectraMuse — Where stories become color, sound, and motion" />
<meta property="og:description" content="A synesthetic typewriter for living stories. Write, watch, listen, record, and share your story as color, texture, and sound." />
<meta property="og:url" content="https://spectramuse.com/" />
<meta property="og:image" content="https://spectramuse.com/assets/spectramuse-social.png" />
<meta property="og:image:secure_url" content="https://spectramuse.com/assets/spectramuse-social.png" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="SpectraMuse story performance preview with color and sound waves" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="SpectraMuse — Where stories become color, sound, and motion" />
<meta name="twitter:description" content="A synesthetic typewriter for living stories. Write, watch, listen, record, and share your story as color, texture, and sound." />
<meta name="twitter:image" content="https://spectramuse.com/assets/spectramuse-social.png" />
<meta name="twitter:image:alt" content="SpectraMuse story performance preview with color and sound waves" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2309080b'/%3E%3Ccircle cx='22' cy='24' r='14' fill='%23ffcc7a'/%3E%3Ccircle cx='42' cy='40' r='16' fill='%237ac7ff' fill-opacity='.82'/%3E%3Cpath d='M17 45h30' stroke='%23f8efe2' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
<style>
  :root {
    --ink: #f8efe2;
    --muted: rgba(248,239,226,.68);
    --line: rgba(255,255,255,.16);
    --accent: #ffcc7a;
    --hue: 32;
    --hue2: 210;
  }

  * { box-sizing: border-box; }

  html { background: #09080b; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
    background: #09080b;
  }

  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .22;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.13) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,.2) 0 1px, transparent 1px);
    background-size: 5px 5px, 7px 7px;
    animation: crawl 1.5s steps(4) infinite;
    z-index: 1;
  }

  @keyframes crawl {
    from { transform: translate(0,0); }
    to { transform: translate(-12px, 9px); }
  }

  .studio {
    position: relative;
    z-index: 2;
    width: min(1180px, calc(100vw - 28px));
    min-height: calc(100vh - 28px);
    margin: 14px auto;
    padding: 16px;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 28px;
    background: linear-gradient(145deg, rgba(9,8,11,.82), rgba(44,22,51,.45));
    box-shadow: 0 24px 120px rgba(0,0,0,.62);
    backdrop-filter: blur(14px);
    display: grid;
    grid-template-columns: minmax(320px, .95fr) minmax(320px, 1.05fr);
    gap: 14px;
  }

  .panel {
    min-height: 0;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 22px;
    background: rgba(0,0,0,.24);
    overflow: hidden;
  }

  .writer {
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 18px 10px;
    border-bottom: 1px solid rgba(255,255,255,.13);
  }

  h1 {
    margin: 0;
    font-size: clamp(32px, 5vw, 62px);
    letter-spacing: -.06em;
    line-height: .92;
  }

  .tagline {
    margin: 10px 0 0;
    color: rgba(248,239,226,.72);
    line-height: 1.35;
  }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
    padding: 6px;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    background: rgba(255,255,255,.05);
  }

  .mode-switch button {
    min-height: 38px;
    padding: 8px 10px;
    color: var(--ink);
    background: transparent;
  }

  body[data-version="lite"] #liteToggle,
  body[data-version="studio"] #studioToggle {
    color: #09080b;
    background: var(--accent);
  }

  textarea {
    flex: 1;
    width: 100%;
    min-height: 260px;
    resize: vertical;
    border: 0;
    outline: none;
    padding: 18px;
    color: var(--ink);
    background: transparent;
    font: 18px/1.5 "Courier New", Courier, monospace;
  }

  .controls,
  .settings {
    display: grid;
    gap: 9px;
    padding: 12px 18px 0;
  }

  .controls {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .settings {
    grid-template-columns: 1fr 1fr;
    padding-bottom: 16px;
    border-top: 1px solid rgba(255,255,255,.13);
  }

  .field {
    display: grid;
    gap: 7px;
    color: rgba(248,239,226,.68);
    font-size: 12px;
  }

  button,
  select,
  input[type="range"] {
    font: 700 14px/1 "Courier New", Courier, monospace;
  }

  button,
  .select-wrap {
    min-height: 44px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
  }

  button {
    cursor: pointer;
    padding: 11px 13px;
    color: #09080b;
    background: var(--accent);
  }

  button.secondary {
    color: var(--ink);
    background: rgba(255,255,255,.08);
  }

  button.ghost {
    color: rgba(248,239,226,.74);
    background: rgba(0,0,0,.16);
  }

  button.danger {
    color: white;
    background: linear-gradient(180deg, #ff686d, #ff4e56);
  }

  button:active { transform: translateY(1px); }

  .select-wrap {
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: rgba(255,255,255,.06);
  }

  select {
    width: 100%;
    border: 0;
    outline: 0;
    color: var(--ink);
    background: transparent;
  }

  input[type="range"] {
    accent-color: var(--accent);
    width: 100%;
  }

  .visualizer {
    position: relative;
    overflow: hidden;
    min-height: 620px;
  }

  .visual-copy {
    position: absolute;
    left: 18px;
    right: 18px;
    top: 18px;
    z-index: 3;
  }

  .visual-copy p {
    margin: 0;
    color: rgba(248,239,226,.68);
    line-height: 1.45;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  .orb {
    position: absolute;
    width: 34vmin;
    height: 34vmin;
    border-radius: 50%;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle at 34% 32%, hsla(var(--hue), 100%, 76%, .96), transparent 28%),
      radial-gradient(circle at 64% 68%, hsla(var(--hue2), 100%, 72%, .82), transparent 34%),
      conic-gradient(from 90deg, hsla(var(--hue),100%,60%,.9), hsla(var(--hue2),100%,62%,.8), hsla(var(--hue),100%,60%,.9));
    filter: blur(.2px) saturate(1.25);
    box-shadow: 0 0 90px hsla(var(--hue), 100%, 70%, .45);
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(.9) rotate(0deg); }
    50% { transform: translate(-50%, -50%) scale(1.12) rotate(14deg); }
  }

  .wave {
    position: absolute;
    inset: auto 20px 28px;
    height: 140px;
    display: flex;
    align-items: end;
    gap: 7px;
  }

  .bar {
    flex: 1;
    min-width: 4px;
    border-radius: 999px;
    background: linear-gradient(to top, hsla(var(--hue2),100%,70%,.35), hsla(var(--hue),100%,76%,.9));
    transform-origin: bottom;
    animation: pulse 900ms ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { transform: scaleY(.25); opacity: .45; }
    to { transform: scaleY(1); opacity: .95; }
  }

  .status-card {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 184px;
    z-index: 3;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .readout {
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 16px;
    padding: 10px;
    background: rgba(0,0,0,.25);
  }

  .readout strong {
    display: block;
    font-size: 18px;
    color: var(--accent);
  }

  .readout span {
    display: block;
    margin-top: 4px;
    color: rgba(248,239,226,.62);
    font-size: 11px;
  }

  .status {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 152px;
    z-index: 3;
    color: rgba(248,239,226,.72);
    font-size: 13px;
  }

  body[data-version="lite"] .studio-only { display: none !important; }
  body[data-version="studio"] .lite-only { display: none !important; }

  @media (max-width: 820px) {
    .studio {
      width: calc(100vw - 20px);
      min-height: auto;
      margin: 10px auto;
      border-radius: 22px;
      padding: 10px;
      grid-template-columns: 1fr;
    }

    h1 { font-size: clamp(42px, 13vw, 62px); }
    .tagline { font-size: 14px; }
    textarea { min-height: 245px; font-size: 16px; }
    .settings { grid-template-columns: 1fr; }
    .visualizer { min-height: 430px; }
    .orb { width: 62vmin; height: 62vmin; }
    .wave { height: 100px; inset: auto 12px 18px; gap: 5px; }
    .status-card { left: 12px; right: 12px; bottom: 154px; gap: 7px; }
    .readout { padding: 8px; }
    .readout strong { font-size: 15px; }
    .readout span { font-size: 10px; }
    .status { left: 12px; right: 12px; bottom: 124px; font-size: 12px; }
  }

  @media (max-width: 470px) {
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body data-version="lite">
<canvas id="stage"></canvas>
<div class="grain"></div>
<main class="studio">
  <section class="panel writer">
    <header>
      <h1>SpectraMuse</h1>
      <p class="tagline">A synesthetic typewriter for living stories. Write a line. Watch it bloom into color, motion, and sound.</p>
      <div class="mode-switch" aria-label="Choose Lite or Studio">
        <button id="liteToggle" type="button" data-version-target="lite">Lite</button>
        <button id="studioToggle" type="button" data-version-target="studio">Studio</button>
      </div>
    </header>

    <textarea id="story" spellcheck="true">The moon found a hidden door in the lake, and every ripple sang in blue.</textarea>

    <div class="controls">
      <button data-action="play">Play feeling</button>
      <button class="secondary studio-only" data-action="stop">Stop sound</button>
      <button class="secondary" data-action="sample">New sample</button>
      <button class="secondary lite-only" data-action="copy">Copy story</button>
      <button class="secondary studio-only" data-action="previewScene">Preview Scene</button>
      <button class="danger studio-only" data-action="saveMp4Story">Save MP4 Story</button>
      <button class="secondary studio-only" data-action="saveMp4Scene">Save MP4 Scene</button>
      <button class="secondary studio-only" data-action="saveImage">Save Image</button>
      <button class="secondary studio-only" data-action="copy">Copy Caption</button>
      <button class="secondary studio-only" data-action="save">Download Story</button>
      <button class="secondary studio-only" data-action="storyboard">Storyboard</button>
      <button class="ghost" data-action="clear">Clear</button>
    </div>

    <div class="settings">
      <label class="field">Mood palette
        <span class="select-wrap">
          <select id="palette">
            <option value="classic">Classic glow</option>
            <option value="dream">Dream lake</option>
            <option value="storm">Storm page</option>
            <option value="ember">Ember room</option>
          </select>
        </span>
      </label>
      <label class="field">Motion intensity
        <input id="intensity" type="range" min="25" max="100" value="74" />
      </label>
    </div>
  </section>

  <section class="panel visualizer" aria-label="Story visualizer">
    <div class="visual-copy">
      <p class="eyebrow">Living preview</p>
      <p>Vowels warm the light. Consonants sharpen the texture. Emotion bends the wave.</p>
    </div>
    <div class="orb" id="orb"></div>
    <div class="status-card" aria-label="Mood signature">
      <div class="readout"><strong id="hueReadout">0</strong><span>hue</span></div>
      <div class="readout"><strong id="textureReadout">0</strong><span>texture</span></div>
      <div class="readout"><strong id="intensityReadout">0%</strong><span>intensity</span></div>
    </div>
    <p class="status" id="status">Ready.</p>
    <div class="wave" id="wave"></div>
  </section>
</main>
<script>
const text = document.getElementById('story');
const orb = document.getElementById('orb');
const wave = document.getElementById('wave');
const status = document.getElementById('status');
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const palette = document.getElementById('palette');
const intensity = document.getElementById('intensity');
const hueReadout = document.getElementById('hueReadout');
const textureReadout = document.getElementById('textureReadout');
const intensityReadout = document.getElementById('intensityReadout');
let audioContext;
let currentOscillator;
let sampleIndex = 0;

const samples = [
  'The moon found a hidden door in the lake, and every ripple sang in blue.',
  'A velvet thunderstorm rolled across the library while the lamps learned to hum.',
  'She folded sunlight into her pocket and walked home through a forest of bells.',
  'The city breathed neon, soft rain, and tiny golden static after midnight.'
];

const palettes = {
  classic: { hueShift: 18, hue2Shift: 190, accent: '#ffcc7a', type: 'triangle', base: 180 },
  dream: { hueShift: 206, hue2Shift: 282, accent: '#7ac7ff', type: 'sine', base: 210 },
  storm: { hueShift: 254, hue2Shift: 38, accent: '#c5b7ff', type: 'sawtooth', base: 145 },
  ember: { hueShift: 8, hue2Shift: 158, accent: '#ff9a6b', type: 'triangle', base: 168 }
};

for (let i = 0; i < 34; i++) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = `${20 + Math.random() * 130}px`;
  bar.style.animationDelay = `${Math.random() * 900}ms`;
  bar.style.animationDuration = `${620 + Math.random() * 900}ms`;
  wave.appendChild(bar);
}

function getRequestedVersion() {
  const params = new URLSearchParams(location.search);
  const urlMode = params.get('mode');
  if (urlMode === 'studio' || urlMode === 'lite') return urlMode;
  return localStorage.getItem('spectramuse-version') || 'lite';
}

function setVersion(version, save = true) {
  const chosen = version === 'studio' ? 'studio' : 'lite';
  document.body.dataset.version = chosen;
  document.getElementById('liteToggle').setAttribute('aria-pressed', String(chosen === 'lite'));
  document.getElementById('studioToggle').setAttribute('aria-pressed', String(chosen === 'studio'));
  if (save) localStorage.setItem('spectramuse-version', chosen);
  status.textContent = chosen === 'lite' ? 'Lite mode is on. Full tones and animation are active.' : 'Studio mode is on. Full controls unlocked.';
  renderMood();
}

function scoreWords(value) {
  const letters = value.toLowerCase().replace(/[^a-z]/g, '');
  const vowels = (letters.match(/[aeiou]/g) || []).length;
  const consonants = Math.max(letters.length - vowels, 1);
  const warmth = Math.round((vowels / Math.max(letters.length, 1)) * 360);
  const density = Math.min(1, value.length / 280);
  return { warmth, density, consonants };
}

function renderMood() {
  const s = scoreWords(text.value);
  const p = palettes[palette.value] || palettes.classic;
  const motion = Number(intensity.value) / 100;
  const hue = (s.warmth + p.hueShift) % 360;
  const hue2 = (s.consonants * 11 + p.hue2Shift) % 360;

  document.documentElement.style.setProperty('--hue', String(hue));
  document.documentElement.style.setProperty('--hue2', String(hue2));
  document.documentElement.style.setProperty('--accent', p.accent);

  const size = 26 + s.density * 20 + motion * 8;
  orb.style.width = `${size}vmin`;
  orb.style.height = `${size}vmin`;
  orb.style.animationDuration = `${6.2 - motion * 2.6}s`;

  [...wave.children].forEach((bar, i) => {
    const h = 16 + Math.abs(Math.sin((i + s.consonants) * .47)) * (62 + s.density * 110) * motion;
    bar.style.height = `${h}px`;
  });

  hueReadout.textContent = String(s.warmth);
  textureReadout.textContent = String(s.consonants);
  intensityReadout.textContent = `${Math.round(s.density * 100)}%`;
}

function stopSound() {
  if (currentOscillator) {
    try { currentOscillator.stop(); } catch (error) {}
    currentOscillator = null;
  }
}

function playFeeling(label = 'Playing a soft browser-generated tone map.') {
  renderMood();
  stopSound();
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) {
    status.textContent = 'Audio is not supported in this browser.';
    return;
  }
  audioContext = audioContext || new AudioContext();
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  const s = scoreWords(text.value);
  const p = palettes[palette.value] || palettes.classic;
  const motion = Number(intensity.value) / 100;
  osc.type = p.type;
  osc.frequency.value = p.base + s.warmth * 1.8 + motion * 80;
  gain.gain.setValueAtTime(.0001, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(.11 * motion, audioContext.currentTime + .04);
  gain.gain.exponentialRampToValueAtTime(.0001, audioContext.currentTime + 1.05);
  osc.connect(gain).connect(audioContext.destination);
  osc.start();
  osc.stop(audioContext.currentTime + 1.08);
  currentOscillator = osc;
  status.textContent = label;
}

async function copyStory() {
  try {
    await navigator.clipboard.writeText(text.value);
    status.textContent = 'Story copied to clipboard.';
  } catch (error) {
    text.focus();
    text.select();
    status.textContent = 'Copy shortcut ready: press Command+C or Ctrl+C.';
  }
}

function saveStory() {
  const blob = new Blob([text.value], { type: 'text/plain' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'spectramuse-story.txt';
  link.click();
  URL.revokeObjectURL(link.href);
  status.textContent = 'Story text downloaded.';
}

function nextSample() {
  sampleIndex = (sampleIndex + 1) % samples.length;
  text.value = samples[sampleIndex];
  renderMood();
  status.textContent = 'Sample loaded.';
}

function saveImage() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#09080b"/><circle cx="420" cy="260" r="190" fill="hsl(${getComputedStyle(document.documentElement).getPropertyValue('--hue')},90%,62%)" opacity=".72"/><circle cx="780" cy="360" r="210" fill="hsl(${getComputedStyle(document.documentElement).getPropertyValue('--hue2')},90%,62%)" opacity=".58"/><text x="80" y="150" fill="#f8efe2" font-family="Courier New" font-size="76" font-weight="700">SpectraMuse</text><text x="80" y="232" fill="#f8efe2" opacity=".74" font-family="Courier New" font-size="34">Where stories become color, sound, and motion.</text></svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'spectramuse-scene.svg';
  link.click();
  URL.revokeObjectURL(link.href);
  status.textContent = 'Image saved as SVG.';
}

function handleAction(action) {
  if (action === 'play') playFeeling();
  if (action === 'previewScene') playFeeling('Previewing scene.');
  if (action === 'stop') { stopSound(); status.textContent = 'Sound stopped.'; }
  if (action === 'sample') nextSample();
  if (action === 'copy') copyStory();
  if (action === 'save') saveStory();
  if (action === 'saveMp4Story') status.textContent = 'MP4 story export is staged for the next engine build.';
  if (action === 'saveMp4Scene') status.textContent = 'MP4 scene export is staged for the next engine build.';
  if (action === 'saveImage') saveImage();
  if (action === 'storyboard') { palette.value = 'dream'; status.textContent = 'Storyboard mood selected.'; renderMood(); }
  if (action === 'clear') { text.value = ''; renderMood(); status.textContent = 'Cleared. Start a new line.'; }
}

document.querySelectorAll('[data-action]').forEach((button) => {
  button.addEventListener('click', () => handleAction(button.dataset.action));
});
document.querySelectorAll('[data-version-target]').forEach((button) => {
  button.addEventListener('click', () => setVersion(button.dataset.versionTarget));
});
text.addEventListener('input', renderMood);
palette.addEventListener('change', renderMood);
intensity.addEventListener('input', renderMood);

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
}
addEventListener('resize', resize);
resize();

const particles = Array.from({ length: 120 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.8 + .4,
  v: Math.random() * .0008 + .0002
}));

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(248,239,226,.35)';
  for (const p of particles) {
    p.y -= p.v;
    if (p.y < 0) p.y = 1;
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, p.r * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

setVersion(getRequestedVersion(), false);
renderMood();
draw();
</script>
</body>
</html>
