<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpectraMuse — Where stories become color, sound, and motion</title>
<meta name="description" content="SpectraMuse turns written stories into moving color, texture, and sound so creators can record and share living story performances." />
<link rel="canonical" href="https://spectramuse.com/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="SpectraMuse" />
<meta property="og:title" content="SpectraMuse — Where stories become color, sound, and motion" />
<meta property="og:description" content="A synesthetic typewriter for living stories. Write, watch, listen, record, and share your story as color, texture, and sound." />
<meta property="og:url" content="https://spectramuse.com/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="SpectraMuse — Where stories become color, sound, and motion" />
<meta name="twitter:description" content="A synesthetic typewriter for living stories. Write, watch, listen, record, and share your story as color, texture, and sound." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2309080b'/%3E%3Ccircle cx='22' cy='24' r='14' fill='%23ffcc7a'/%3E%3Ccircle cx='42' cy='40' r='16' fill='%237ac7ff' fill-opacity='.82'/%3E%3Cpath d='M17 45h30' stroke='%23f8efe2' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
<style>
  :root {
    --ink: #f8efe2;
    --accent: #ffcc7a;
    --hue: 32;
    --hue2: 210;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
    background: #09080b;
  }

  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .22;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.13) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,.2) 0 1px, transparent 1px);
    background-size: 5px 5px, 7px 7px;
    animation: crawl 1.5s steps(4) infinite;
    z-index: 1;
  }

  @keyframes crawl {
    from { transform: translate(0,0); }
    to { transform: translate(-12px, 9px); }
  }

  .studio {
    position: relative;
    z-index: 2;
    width: min(1180px, calc(100vw - 28px));
    height: min(94vh, 940px);
    margin: 3.5vh auto;
    padding: 22px;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 28px;
    background: linear-gradient(145deg, rgba(9,8,11,.82), rgba(44,22,51,.45));
    box-shadow: 0 24px 120px rgba(0,0,0,.62);
    backdrop-filter: blur(14px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .panel {
    min-height: 0;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 22px;
    background: rgba(0,0,0,.22);
    overflow: hidden;
  }

  .writer {
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 18px 10px;
    border-bottom: 1px solid rgba(255,255,255,.13);
  }

  h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 58px);
    letter-spacing: -.05em;
    line-height: .95;
  }

  .tagline {
    margin: 10px 0 0;
    color: rgba(248,239,226,.72);
    line-height: 1.35;
  }

  textarea {
    flex: 1;
    width: 100%;
    min-height: 300px;
    resize: none;
    border: 0;
    outline: none;
    padding: 18px;
    color: var(--ink);
    background: transparent;
    font: 18px/1.5 "Courier New", Courier, monospace;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 14px 18px 18px;
    border-top: 1px solid rgba(255,255,255,.13);
  }

  button {
    cursor: pointer;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    padding: 11px 15px;
    color: #09080b;
    background: var(--accent);
    font: 700 14px/1 "Courier New", Courier, monospace;
  }

  button.secondary {
    color: var(--ink);
    background: rgba(255,255,255,.08);
  }

  .visualizer {
    position: relative;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    width: 34vmin;
    height: 34vmin;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle at 34% 32%, hsla(var(--hue), 100%, 76%, .96), transparent 28%),
      radial-gradient(circle at 64% 68%, hsla(var(--hue2), 100%, 72%, .82), transparent 34%),
      conic-gradient(from 90deg, hsla(var(--hue),100%,60%,.9), hsla(var(--hue2),100%,62%,.8), hsla(var(--hue),100%,60%,.9));
    filter: blur(.2px) saturate(1.25);
    box-shadow: 0 0 90px hsla(var(--hue), 100%, 70%, .45);
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(.9) rotate(0deg); }
    50% { transform: translate(-50%, -50%) scale(1.12) rotate(14deg); }
  }

  .wave {
    position: absolute;
    inset: auto 20px 28px;
    height: 160px;
    display: flex;
    align-items: end;
    gap: 7px;
  }

  .bar {
    flex: 1;
    min-width: 4px;
    border-radius: 999px;
    background: linear-gradient(to top, hsla(var(--hue2),100%,70%,.35), hsla(var(--hue),100%,76%,.9));
    transform-origin: bottom;
    animation: pulse 900ms ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { transform: scaleY(.25); opacity: .45; }
    to { transform: scaleY(1); opacity: .95; }
  }

  .caption {
    position: absolute;
    left: 22px;
    right: 22px;
    top: 20px;
    color: rgba(248,239,226,.68);
    line-height: 1.45;
  }

  .status {
    position: absolute;
    left: 22px;
    bottom: 202px;
    max-width: calc(100% - 44px);
    color: rgba(248,239,226,.72);
    font-size: 14px;
  }

  @media (max-width: 780px) {
    body { overflow: auto; }
    .studio {
      height: auto;
      grid-template-columns: 1fr;
      margin: 14px;
    }
    .visualizer { min-height: 420px; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="grain"></div>
<main class="studio">
  <section class="panel writer">
    <header>
      <h1>SpectraMuse</h1>
      <p class="tagline">A synesthetic typewriter for living stories. Write a line. Watch it bloom into color, motion, and sound.</p>
    </header>
    <textarea id="story" spellcheck="true">The moon found a hidden door in the lake, and every ripple sang in blue.</textarea>
    <div class="controls">
      <button id="play">Play the feeling</button>
      <button id="record" class="secondary">Record clip</button>
      <button id="clear" class="secondary">Clear</button>
    </div>
  </section>
  <section class="panel visualizer" aria-label="Story visualizer">
    <p class="caption">Words become atmosphere. Vowels warm the light. Consonants sharpen the texture. Emotion bends the wave.</p>
    <div class="orb" id="orb"></div>
    <p class="status" id="status">Ready.</p>
    <div class="wave" id="wave"></div>
  </section>
</main>
<script>
const text = document.getElementById('story');
const orb = document.getElementById('orb');
const wave = document.getElementById('wave');
const status = document.getElementById('status');
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

for (let i = 0; i < 34; i++) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = `${20 + Math.random() * 130}px`;
  bar.style.animationDelay = `${Math.random() * 900}ms`;
  bar.style.animationDuration = `${620 + Math.random() * 900}ms`;
  wave.appendChild(bar);
}

function scoreWords(value) {
  const letters = value.toLowerCase().replace(/[^a-z]/g, '');
  const vowels = (letters.match(/[aeiou]/g) || []).length;
  const consonants = Math.max(letters.length - vowels, 1);
  const warmth = Math.round((vowels / Math.max(letters.length, 1)) * 360);
  const density = Math.min(1, value.length / 280);
  return { warmth, density, consonants };
}

function renderMood() {
  const s = scoreWords(text.value);
  document.documentElement.style.setProperty('--hue', String((s.warmth + 18) % 360));
  document.documentElement.style.setProperty('--hue2', String((s.consonants * 11 + 190) % 360));
  orb.style.width = `${26 + s.density * 20}vmin`;
  orb.style.height = `${26 + s.density * 20}vmin`;
  [...wave.children].forEach((bar, i) => {
    const h = 18 + Math.abs(Math.sin((i + s.consonants) * .47)) * (70 + s.density * 110);
    bar.style.height = `${h}px`;
  });
  status.textContent = `Mood signature: hue ${s.warmth}, texture ${s.consonants}, intensity ${Math.round(s.density * 100)}%.`;
}

text.addEventListener('input', renderMood);
document.getElementById('clear').addEventListener('click', () => { text.value = ''; renderMood(); });
document.getElementById('play').addEventListener('click', () => {
  renderMood();
  status.textContent = 'Playing a soft browser-generated tone map. Full sound engine coming soon.';
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  const s = scoreWords(text.value);
  osc.frequency.value = 180 + s.warmth * 2.4;
  gain.gain.setValueAtTime(.0001, audio.currentTime);
  gain.gain.exponentialRampToValueAtTime(.09, audio.currentTime + .04);
  gain.gain.exponentialRampToValueAtTime(.0001, audio.currentTime + .9);
  osc.connect(gain).connect(audio.destination);
  osc.start();
  osc.stop(audio.currentTime + 1);
});
document.getElementById('record').addEventListener('click', () => {
  status.textContent = 'Recording/export will arrive in the next build.';
});

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
}
addEventListener('resize', resize);
resize();

const particles = Array.from({ length: 120 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.8 + .4,
  v: Math.random() * .0008 + .0002
}));

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(248,239,226,.35)';
  for (const p of particles) {
    p.y -= p.v;
    if (p.y < 0) p.y = 1;
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, p.r * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
renderMood();
draw();
</script>
</body>
</html>
