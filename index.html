<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpectraMuse — Where stories become color, sound, and motion</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2309080b'/%3E%3Ccircle cx='22' cy='24' r='14' fill='%23ffcc7a'/%3E%3Ccircle cx='42' cy='40' r='16' fill='%237ac7ff' fill-opacity='.82'/%3E%3Cpath d='M17 45h30' stroke='%23f8efe2' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
<style>
  :root {
    --ink: #f8efe2;
    --accent: #ffcc7a;
    --hue: 32;
    --hue2: 210;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
    background: #09080b;
  }

  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .22;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.13) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,.2) 0 1px, transparent 1px);
    background-size: 5px 5px, 7px 7px;
    animation: crawl 1.5s steps(4) infinite;
    z-index: 1;
  }

  @keyframes crawl {
    from { transform: translate(0,0); }
    to { transform: translate(-12px, 9px); }
  }

  .studio {
    position: relative;
    z-index: 2;
    width: min(1180px, calc(100vw - 28px));
    height: min(94vh, 940px);
    margin: 3.5vh auto;
    padding: 22px;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 28px;
    background: linear-gradient(145deg, rgba(25,21,30,.88), rgba(6,6,10,.74));
    box-shadow: 0 35px 120px rgba(0,0,0,.62), inset 0 0 50px rgba(255,255,255,.04);
    backdrop-filter: blur(12px);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto auto;
    gap: 14px;
  }

  .topbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 18px;
    align-items: flex-start;
    position: relative;
  }

  h1 {
    margin: 0;
    font-size: clamp(2.1rem, 4.2vw, 4rem);
    line-height: .95;
    letter-spacing: .02em;
    text-shadow: 0 0 22px rgba(255,255,255,.14);
  }

  .subcopy {
    color: rgba(248,239,226,.65);
    font-size: .95rem;
    margin-top: 10px;
    line-height: 1.4;
  }

  .setup-wrap {
    position: relative;
    z-index: 8;
  }

  .top-actions {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: flex-end;
    gap: 12px;
  }

  .volume-control {
    width: min(360px, calc(100vw - 48px));
    min-height: 66px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.13);
    background: rgba(255,255,255,.065);
    box-shadow: 0 18px 45px rgba(0,0,0,.28), inset 0 0 24px rgba(255,255,255,.025);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .display-control {
    width: min(250px, calc(100vw - 48px));
    min-height: 66px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.13);
    background: rgba(255,255,255,.065);
    box-shadow: 0 18px 45px rgba(0,0,0,.28), inset 0 0 24px rgba(255,255,255,.025);
    display: grid;
    gap: 8px;
  }

  .display-control select {
    width: 100%;
    min-height: 38px;
    padding: 9px 11px;
  }

  .mute-button {
    min-width: 92px;
    padding: 11px 10px;
  }

  .volume-meter {
    min-width: 0;
    flex: 1;
    display: grid;
    gap: 8px;
  }

  .volume-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .volume-level {
    color: var(--accent);
    font-size: .86rem;
    letter-spacing: 0;
    text-transform: none;
    white-space: nowrap;
  }

  .volume-slider {
    width: 100%;
    min-width: 0;
    height: 28px;
    margin: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .setup-button {
    min-width: 112px;
  }

  .setup-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: min(330px, calc(100vw - 48px));
    padding: 14px;
    display: grid;
    gap: 12px;
    border: 1px solid color-mix(in srgb, var(--accent), rgba(255,255,255,.16) 58%);
    border-radius: 18px;
    background: rgba(12,10,17,.94);
    box-shadow: 0 22px 70px rgba(0,0,0,.48), inset 0 0 35px rgba(255,255,255,.035);
    backdrop-filter: blur(14px);
  }

  .setup-dropdown[hidden] {
    display: none;
  }

  .setup-field {
    display: grid;
    gap: 7px;
  }

  .setup-field select {
    width: 100%;
  }

  .setup-field .label {
    color: var(--accent);
  }

  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1.04fr) minmax(320px, .96fr);
    gap: 14px;
    min-height: 0;
  }

  .editor, .viewer, .panel {
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.13);
    background: rgba(255,255,255,.055);
  }

  .editor {
    padding: 16px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    min-height: 0;
  }

  .label {
    font-size: .76rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(248,239,226,.54);
  }

  textarea {
    width: 100%;
    min-height: 0;
    resize: none;
    border: 0;
    outline: none;
    border-radius: 16px;
    padding: 18px;
    color: var(--ink);
    background: rgba(0,0,0,.2);
    font: 700 clamp(1.1rem, 2.4vw, 2rem) "Courier New", Courier, monospace;
    line-height: 1.32;
    caret-color: var(--accent);
    box-shadow: inset 0 0 35px rgba(0,0,0,.18);
  }

  textarea::placeholder {
    color: rgba(248,239,226,.26);
  }

  .typebar {
    min-height: 56px;
    border-radius: 14px;
    padding: 11px 14px;
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.10);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .current-word {
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 18px color-mix(in srgb, var(--accent), transparent 50%);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .viewer {
    display: grid;
    grid-template-rows: auto auto auto;
    align-content: start;
    gap: 12px;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
  }

  .story-card {
    position: relative;
    height: clamp(220px, 32vh, 380px);
    min-height: 220px;
    display: grid;
    place-items: center;
    padding: 22px;
    overflow: hidden;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.11);
    background: rgba(0,0,0,.22);
  }

  .story-card::before {
    content: "";
    position: absolute;
    inset: -30%;
    background:
      radial-gradient(circle at 30% 20%, hsla(var(--hue), 90%, 70%, .26), transparent 32%),
      radial-gradient(circle at 70% 70%, hsla(var(--hue2), 92%, 66%, .28), transparent 35%);
    animation: rotateField 12s linear infinite;
  }

  @keyframes rotateField {
    from { transform: rotate(0deg) scale(1); }
    to { transform: rotate(360deg) scale(1.1); }
  }

  .line-display {
    position: relative;
    z-index: 1;
    width: 100%;
    max-height: 100%;
    overflow: auto;
    font-size: clamp(1.18rem, 2.45vw, 2.25rem);
    line-height: 1.23;
    font-weight: 800;
    text-align: center;
    text-shadow: 0 4px 28px rgba(0,0,0,.72);
    white-space: pre-wrap;
  }

  .display-token {
    display: inline;
    border-radius: 4px;
  }

  html[data-display-mode="spectraColor"] .display-token {
    font-weight: 850;
  }

  html[data-display-mode="spectraColor"] .display-token-0 {
    color: #ffd27a;
    text-shadow: 0 0 16px rgba(255,210,122,.30);
  }

  html[data-display-mode="spectraColor"] .display-token-1 {
    color: #7bd3ff;
    text-shadow: 0 0 16px rgba(123,211,255,.26);
  }

  html[data-display-mode="spectraColor"] .display-token-2 {
    color: #f79ac8;
    text-shadow: 0 0 14px rgba(247,154,200,.24);
  }

  html[data-display-mode="spectraColor"] .display-token-3 {
    color: #bda2ff;
    text-shadow: 0 0 14px rgba(189,162,255,.24);
  }

  html[data-display-mode="spectraColor"] .display-token-4 {
    color: #8ee9d6;
    text-shadow: 0 0 14px rgba(142,233,214,.22);
  }

  html[data-display-mode="spectraColor"] .display-token-5 {
    color: #f8efe2;
    text-shadow: 0 0 12px rgba(248,239,226,.18);
  }

  html[data-display-mode="colorblindFriendly"] .display-token {
    font-weight: 850;
    text-decoration-line: underline;
    text-underline-offset: .15em;
    text-decoration-thickness: .08em;
    text-shadow: 0 3px 16px rgba(0,0,0,.82);
  }

  html[data-display-mode="colorblindFriendly"] .display-token-0 {
    color: #56b4e9;
    text-decoration-style: solid;
  }

  html[data-display-mode="colorblindFriendly"] .display-token-1 {
    color: #e6ab02;
    text-decoration-style: double;
  }

  html[data-display-mode="colorblindFriendly"] .display-token-2 {
    color: #cc79a7;
    text-decoration-style: dotted;
  }

  html[data-display-mode="colorblindFriendly"] .display-token-3 {
    color: #00b8a9;
    text-decoration-style: dashed;
  }

  html[data-display-mode="colorblindFriendly"] .display-token-4 {
    color: #f0e442;
    text-decoration-style: solid;
  }

  html[data-display-mode="colorblindFriendly"] .display-token-5 {
    color: #f8efe2;
    text-decoration-style: dotted;
  }

  html[data-display-mode="highContrast"] .story-card {
    background: rgba(0,0,0,.76);
    border-color: rgba(255,255,255,.62);
    box-shadow: none;
  }

  html[data-display-mode="highContrast"] .story-card::before {
    opacity: .05;
    animation: none;
  }

  html[data-display-mode="highContrast"] .line-display {
    color: #ffffff;
    padding: 8px;
    text-shadow: none;
  }

  html[data-display-mode="plain"] .line-display {
    color: var(--ink);
  }

  .preview-readouts {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .panel {
    padding: 13px;
    min-height: 84px;
  }

  .value {
    margin-top: 9px;
    font-size: .96rem;
    line-height: 1.35;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 9px;
  }

  .statusbar {
    min-height: 46px;
    border-radius: 14px;
    padding: 12px 14px;
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.10);
    display: flex;
    align-items: center;
  }

  button, select {
    border: 0;
    border-radius: 13px;
    padding: 13px 12px;
    background: var(--accent);
    color: #151016;
    font: 800 .93rem "Courier New", Courier, monospace;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(0,0,0,.25);
  }

  button.secondary, select {
    background: rgba(255,255,255,.10);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,.14);
  }

  button.record {
    background: linear-gradient(180deg, #ff7a7a, #ff5252);
    color: white;
  }

  button.stop {
    background: linear-gradient(180deg, #ffd07a, #ffb347);
    color: #19130d;
  }

  button:active { transform: translateY(2px); }

  button:focus-visible,
  select:focus-visible,
  textarea:focus-visible,
  .volume-slider:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .hint {
    color: rgba(248,239,226,.55);
    font-size: .86rem;
    line-height: 1.35;
  }

  .status {
    color: rgba(248,239,226,.72);
    font-size: .86rem;
    min-height: 1.2em;
    line-height: 1.35;
    overflow-wrap: anywhere;
  }

  button:disabled,
  select:disabled {
    cursor: not-allowed;
    opacity: .52;
    box-shadow: none;
  }

  button:disabled:active {
    transform: none;
  }

  @media (max-width: 900px) {
    body { overflow: auto; }
    .studio { height: auto; margin: 14px auto; }
    .workspace { grid-template-columns: 1fr; }
    .preview-readouts { grid-template-columns: 1fr; }
    .actions { grid-template-columns: 1fr 1fr; }
    .topbar { align-items: flex-start; }
    .top-actions { flex-wrap: wrap; }
    .display-control { flex: 1 1 220px; }
    .volume-control { flex: 1 1 260px; }
    .story-card {
      height: clamp(230px, 38vw, 320px);
      min-height: 230px;
    }
    .line-display { font-size: clamp(1.15rem, 5.2vw, 2rem); }
    textarea { min-height: 360px; }
  }

  @media (max-width: 540px) {
    .topbar { flex-direction: column; }
    .top-actions { width: 100%; margin-left: 0; flex-direction: column; }
    .display-control { width: 100%; }
    .volume-control { width: 100%; }
    .setup-wrap { width: 100%; margin-left: 0; }
    .setup-button { width: 100%; }
    .setup-dropdown { left: 0; right: auto; width: 100%; }
    .actions { grid-template-columns: 1fr; }
    .story-card {
      height: clamp(230px, 58vw, 300px);
      padding: 18px;
    }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="grain"></div>

<main class="studio">
  <section class="topbar">
    <div>
      <h1>SpectraMuse</h1>
      <div class="subcopy">
        Where stories become color, sound, and motion.
      </div>
    </div>
    <div class="top-actions">
      <section class="display-control" aria-labelledby="displayModeLabel">
        <label id="displayModeLabel" class="label" for="displayModeSelect">Text Mode</label>
        <select id="displayModeSelect" aria-label="Text color display mode">
          <option value="plain">Plain</option>
          <option value="spectraColor">Spectra Color</option>
          <option value="colorblindFriendly">Colorblind Friendly</option>
          <option value="highContrast">High Contrast</option>
        </select>
      </section>
      <section class="volume-control" aria-labelledby="volumeLabel">
        <button id="muteButton" class="mute-button secondary" type="button" aria-pressed="false" aria-label="Mute sound">Mute</button>
        <div class="volume-meter">
          <label id="volumeLabel" class="label volume-label" for="volumeSlider">
            <span>Volume</span>
            <span id="volumeLevel" class="volume-level">80%</span>
          </label>
          <input id="volumeSlider" class="volume-slider" type="range" min="0" max="200" step="1" value="80" aria-label="Audio volume from 0 to 200 percent" aria-valuemin="0" aria-valuemax="200" aria-valuenow="80" aria-valuetext="80 percent" />
        </div>
      </section>
      <div class="setup-wrap">
        <button id="setupButton" class="setup-button" type="button" aria-expanded="false" aria-controls="setupDropdown">Setup</button>
        <div id="setupDropdown" class="setup-dropdown" hidden>
          <div class="setup-field">
            <label class="label" for="moodPresetSelect">Mood Preset</label>
            <select id="moodPresetSelect" title="Choose mood preset">
              <option value="storyReactive">Story Reactive</option>
            </select>
          </div>
          <div class="setup-field">
            <label class="label" for="soundModeSelect">Sound Mode</label>
            <select id="soundModeSelect" title="Choose generated sound style">
              <option value="museBell">Muse Bell</option>
              <option value="deepDrone">Deep Drone</option>
              <option value="crystalPluck">Crystal Pluck</option>
              <option value="staticPulse">Static Pulse</option>
              <option value="velvetPad">Velvet Pad</option>
              <option value="typewriterPercussion">Typewriter Percussion</option>
              <option value="oceanWash">Ocean Wash</option>
              <option value="auroraChoir">Aurora Choir</option>
            </select>
          </div>
          <div class="setup-field">
            <label class="label" for="formatSelect">Output Format</label>
            <select id="formatSelect" title="Choose output shape">
              <option value="vertical">Vertical 9:16 social video frame</option>
              <option value="square">Square post frame</option>
              <option value="wide">Wide YouTube frame</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="workspace">
    <div class="editor">
      <div class="label">Write</div>
      <textarea id="storyInput" placeholder="Type your story here...

Example:
The moon opened like a silver eye.
Moss climbed the old stone door.
Thunder wrote its name across the sky."></textarea>

      <div class="typebar">
        <div>
          <div class="label">Current sensory word</div>
          <div class="current-word" id="currentWord">waiting</div>
        </div>
      </div>
    </div>

    <div class="viewer">
      <div class="label">Preview</div>
      <div class="story-card" id="storyCard">
        <div class="line-display" id="lineDisplay">Your living story will appear here.</div>
      </div>
      <div class="preview-readouts">
        <div class="panel">
          <div class="label">Color</div>
          <div class="value" id="colorName">waiting for ink</div>
        </div>
        <div class="panel">
          <div class="label">Texture</div>
          <div class="value" id="textureName">silent paper</div>
        </div>
        <div class="panel">
          <div class="label">Sound</div>
          <div class="value" id="soundName">unstruck key</div>
        </div>
      </div>
    </div>
  </section>

  <section class="actions">
    <button id="playButton">Preview Story</button>
    <button id="sceneButton" class="secondary">Preview Scene</button>
    <button id="recordButton" class="record">Record Story</button>
    <button id="performAndSaveSceneButton" class="secondary">Record Scene</button>
    <button id="downloadImageButton" class="secondary">Save Image</button>
    <button id="copyButton" class="secondary">Copy Caption</button>
    <button id="downloadTextButton" class="secondary">Download Story</button>
    <button id="downloadStoryboardButton" class="secondary">Storyboard</button>
    <button id="loadSampleButton" class="secondary">Load Sample</button>
    <button id="clearButton" class="secondary">Clear Story</button>
    <button id="stopRecordButton" class="stop secondary" hidden>stop recording</button>
  </section>

  <section class="statusbar">
    <div class="status" id="status">Ready.</div>
  </section>
</main>

<script>
const canvas = document.getElementById("stage");
const ctx = canvas && typeof canvas.getContext === "function" ? canvas.getContext("2d") : null;
const storyInput = document.getElementById("storyInput");
const currentWord = document.getElementById("currentWord");
const lineDisplay = document.getElementById("lineDisplay");
const colorName = document.getElementById("colorName");
const textureName = document.getElementById("textureName");
const soundName = document.getElementById("soundName");
const statusEl = document.getElementById("status");
const playButton = document.getElementById("playButton");
const sceneButton = document.getElementById("sceneButton");
const copyButton = document.getElementById("copyButton");
const downloadTextButton = document.getElementById("downloadTextButton");
const downloadImageButton = document.getElementById("downloadImageButton");
const downloadStoryboardButton = document.getElementById("downloadStoryboardButton");
const performAndSaveSceneButton = document.getElementById("performAndSaveSceneButton");
const clearButton = document.getElementById("clearButton");
const loadSampleButton = document.getElementById("loadSampleButton");
const recordButton = document.getElementById("recordButton");
const stopRecordButton = document.getElementById("stopRecordButton");
const formatSelect = document.getElementById("formatSelect");
const soundModeSelect = document.getElementById("soundModeSelect");
const setupButton = document.getElementById("setupButton");
const setupDropdown = document.getElementById("setupDropdown");
const moodPresetSelect = document.getElementById("moodPresetSelect");
const displayModeSelect = document.getElementById("displayModeSelect");
const muteButton = document.getElementById("muteButton");
const volumeSlider = document.getElementById("volumeSlider");
const volumeLevel = document.getElementById("volumeLevel");

const SOUND_MODES = {
  museBell: { label: "Muse Bell", descriptor: "soft bell" },
  deepDrone: { label: "Deep Drone", descriptor: "low sustained drone" },
  crystalPluck: { label: "Crystal Pluck", descriptor: "bright crystal pluck" },
  staticPulse: { label: "Static Pulse", descriptor: "electric pulse" },
  velvetPad: { label: "Velvet Pad", descriptor: "velvet pad" },
  typewriterPercussion: { label: "Typewriter Percussion", descriptor: "tap and tone" },
  oceanWash: { label: "Ocean Wash", descriptor: "filtered ocean wash" },
  auroraChoir: { label: "Aurora Choir", descriptor: "soft glowing choir" }
};
const DISPLAY_MODES = {
  plain: "Plain",
  spectraColor: "Spectra Color",
  colorblindFriendly: "Colorblind Friendly",
  highContrast: "High Contrast"
};
const DISPLAY_MODE_KEY = "spectramuseDisplayMode.v1";
const DEFAULT_DISPLAY_MODE = "plain";
const DISPLAY_TOKEN_COUNT = 6;
const AUDIO_SETTINGS_KEY = "spectramuseAudioSettings.v1";
const MIN_VOLUME = 0;
const MAX_VOLUME = 2;
const DEFAULT_VOLUME = 0.8;
let displayMode = DEFAULT_DISPLAY_MODE;
let audioSettings = {
  volume: DEFAULT_VOLUME,
  muted: false
};
const activeVolumeGains = new Set();

function clampNumber(value, min, max, fallback) {
  if (!Number.isFinite(value)) return fallback;
  return Math.min(max, Math.max(min, value));
}

function loadAudioSettings() {
  try {
    const raw = window.localStorage && window.localStorage.getItem(AUDIO_SETTINGS_KEY);
    if (!raw) return { volume: DEFAULT_VOLUME, muted: false };

    const parsed = JSON.parse(raw);
    return {
      volume: clampNumber(Number(parsed.volume), MIN_VOLUME, MAX_VOLUME, DEFAULT_VOLUME),
      muted: Boolean(parsed.muted)
    };
  } catch {
    return { volume: DEFAULT_VOLUME, muted: false };
  }
}

function saveAudioSettings() {
  try {
    window.localStorage.setItem(AUDIO_SETTINGS_KEY, JSON.stringify(audioSettings));
  } catch {}
}

function getVolumePercent() {

  const hasCanvasVideoExport = hasCanvas2d && typeof testCanvas.captureStream === "function";

function featureIsSupported(rule) {

function refreshActionAvailability() {
  featureControls.forEach(rule => {
    const { button } = rule;

    const supported = featureIsSupported(rule);

    if (!supported) {
      button.disabled = true;
      button.textContent = rule.label;
      button.title = rule.reason || unsupportedMessages[rule.feature];

async function createStartedAudioContext() {
  const AudioContext = getAudioContextConstructor();
  if (!AudioContext) throw new Error(unsupportedMessages.audioStart);

    if (audio.state === "suspended" && typeof audio.resume === "function") {

    try { await audio.close(); } catch {}

let W, H, t = 0;

  hue: 32,
  hue2: 210,
  saturation: 72,

function hashWord(word) {
  let h = 2166136261;
  for (const c of word) {
    h ^= c.charCodeAt(0);
    h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
  }
  return Math.abs(h >>> 0);
}

function cleanWord(word) {
  return (word || "").toLowerCase().replace(/[^a-z0-9']/g, "");
}

function getWords(text) {
  return (text.match(/[a-zA-Z0-9']+/g) || []).map(cleanWord).filter(Boolean);
}

function getScenes(text) {
  const scenes = text
    .split(/(?<=[.!?])\s+|\n+/)
    .map(s => s.trim())
    .filter(Boolean);
  return scenes.length ? scenes : [text.trim()].filter(Boolean);
}

function analyze(word) {
  const clean = cleanWord(word) || "story";
  const vowels = (clean.match(/[aeiou]/g) || []).length;
  const soft = (clean.match(/[mnlwvsy]/g) || []).length;
  const sharp = (clean.match(/[ktxzpq]/g) || []).length;
  const growl = (clean.match(/[grbd]/g) || []).length;
  const h = hashWord(clean);

  state.word = clean;
  state.hue = h % 360;
  state.hue2 = (state.hue + 90 + (vowels * 17)) % 360;
  state.saturation = Math.min(96, 52 + (sharp * 6) + (vowels * 3));
  state.lightness = 38 + Math.min(26, soft * 5 + vowels * 2);
  state.energy = Math.min(1, .22 + (sharp + growl + clean.length / 5) / 8);
  state.softness = Math.min(1, .15 + soft / Math.max(1, clean.length));
  state.sharpness = Math.min(1, .12 + sharp / Math.max(1, clean.length));
  state.mode = h % 6;

  const textures = ["velvet bloom", "liquid marble", "electric static", "bark rings", "glass ripples", "star-salt dust"];
  state.texture = textures[state.mode];
  state.soundRoot = 180 + (h % 520);
  state.soundTone = sharp > soft ? "bright pluck" : "warm drone";

  const colorWords = ["ember", "copper", "moss", "lagoon", "violet", "rose", "honey", "ink"];
  colorName.textContent = `${colorWords[Math.floor(state.hue / 45) % colorWords.length]} field — hsl(${state.hue}, ${Math.round(state.saturation)}%, ${Math.round(state.lightness)}%)`;
  textureName.textContent = `${state.texture}, ${state.softness > .45 ? "soft-edged" : "hard-edged"} motion`;
  updateSoundReadout();
  currentWord.textContent = clean;

  document.documentElement.style.setProperty("--accent", `hsl(${state.hue2}, 92%, 68%)`);
  document.documentElement.style.setProperty("--hue", state.hue);
  document.documentElement.style.setProperty("--hue2", state.hue2);
}

function getSelectedSoundMode() {
  const key = soundModeSelect ? soundModeSelect.value : "museBell";
  return SOUND_MODES[key] ? key : "museBell";

function drawField(targetCtx, width, height, localT, scale=1) {
  if (!targetCtx) return;
  const grad = targetCtx.createLinearGradient(0, 0, width, height);
  grad.addColorStop(0, `hsl(${state.hue}, ${state.saturation}%, ${Math.max(10, state.lightness - 24)}%)`);
  grad.addColorStop(.52, `hsl(${state.hue2}, ${Math.min(96, state.saturation + 12)}%, ${state.lightness}%)`);
  grad.addColorStop(1, `hsl(${(state.hue + 190) % 360}, ${state.saturation}%, ${Math.max(11, state.lightness - 18)}%)`);
  targetCtx.fillStyle = grad;
  targetCtx.fillRect(0, 0, width, height);

  targetCtx.globalCompositeOperation = "screen";
  const count = 70 + Math.floor(state.energy * 110);
  for (let i = 0; i < count; i++) {
    const x = width * (.5 + .46 * Math.sin(localT * (0.5 + state.sharpness) + i * 2.13 + state.hue));
    const y = height * (.5 + .42 * Math.cos(localT * (0.75 + state.softness) + i * 1.61));
    const r = (18 + 120 * Math.abs(Math.sin(localT + i))) * scale;
    targetCtx.beginPath();

    if (state.mode === 0) targetCtx.arc(x, y, r * (0.6 + state.softness), 0, Math.PI * 2);
    else if (state.mode === 1) targetCtx.ellipse(x, y, r * 1.8, r * .35, localT + i, 0, Math.PI * 2);
    else if (state.mode === 2) targetCtx.rect(x - r/2, y - r/2, r, r);
    else if (state.mode === 3) targetCtx.arc(x, y, r, 0, Math.PI * (1.2 + Math.sin(localT + i)));
    else if (state.mode === 4) {
      targetCtx.moveTo(x, y - r);
      targetCtx.lineTo(x + r, y);
      targetCtx.lineTo(x, y + r);
      targetCtx.lineTo(x - r, y);
      targetCtx.closePath();
    } else {
      for (let a = 0; a < 6; a++) {
        const px = x + Math.cos(a * Math.PI / 3 + localT) * r;
        const py = y + Math.sin(a * Math.PI / 3 + localT) * r;
        a === 0 ? targetCtx.moveTo(px, py) : targetCtx.lineTo(px, py);
      }
      targetCtx.closePath();
    }

    targetCtx.fillStyle = `hsla(${(state.hue2 + i * 7) % 360}, 90%, 70%, ${0.015 + state.energy * 0.018})`;
    targetCtx.fill();
  }

  targetCtx.globalCompositeOperation = "multiply";
  targetCtx.lineWidth = 1.4 * scale;
  for (let y = 0; y < height; y += 9 * scale) {
    targetCtx.beginPath();
    for (let x = 0; x <= width; x += 18 * scale) {
      const wave = Math.sin(x * .015 + localT * 5 + y * .03) * (7 + state.energy * 22) * scale;
      const yy = y + wave;
      x === 0 ? targetCtx.moveTo(x, yy) : targetCtx.lineTo(x, yy);
    }
    targetCtx.strokeStyle = `hsla(${state.hue}, 70%, 12%, ${.06 + state.sharpness * .08})`;
    targetCtx.stroke();
  }
  targetCtx.globalCompositeOperation = "source-over";
}

function wrapLines(c, text, maxWidth) {
  const words = (text || "").split(/\s+/).filter(Boolean);
  const lines = [];
  let line = "";
  words.forEach(word => {
    const test = line ? `${line} ${word}` : word;
    if (c.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

const CANVAS_DISPLAY_COLORS = {
  spectraColor: ["#ffd27a", "#7bd3ff", "#f79ac8", "#bda2ff", "#8ee9d6", "#f8efe2"],
  colorblindFriendly: ["#56b4e9", "#e6ab02", "#cc79a7", "#00b8a9", "#f0e442", "#f8efe2"]
};

function getCanvasDisplayColor(mode, index) {
  const palette = CANVAS_DISPLAY_COLORS[mode];
  if (!palette) return mode === "highContrast" ? "#ffffff" : "#f8efe2";
  return palette[index % palette.length];
}

function drawDisplayLine(targetCtx, line, centerX, y, mode, textSize) {
  if (mode !== "spectraColor" && mode !== "colorblindFriendly") {
    targetCtx.fillStyle = mode === "highContrast" ? "#ffffff" : "#f8efe2";
    targetCtx.fillText(line, centerX, y);
    return;
  }

  const parts = line.split(/(\s+)/).filter(part => part.length);
  const totalWidth = parts.reduce((sum, part) => sum + targetCtx.measureText(part).width, 0);
  let x = centerX - totalWidth / 2;
  let tokenIndex = 0;
  const originalAlign = targetCtx.textAlign;
  targetCtx.textAlign = "left";

  parts.forEach(part => {
    const width = targetCtx.measureText(part).width;
    if (/^\s+$/.test(part)) {
      x += width;
      return;
    }

    const color = getCanvasDisplayColor(mode, tokenIndex);
    targetCtx.fillStyle = color;
    targetCtx.fillText(part, x, y);

    if (mode === "colorblindFriendly") {
      const underlineY = y + textSize * 0.58;
      const dashPatterns = [[], [6, 5], [2, 4], [10, 4]];
      targetCtx.save();
      targetCtx.strokeStyle = color;
      targetCtx.lineWidth = Math.max(2, textSize * 0.055);
      targetCtx.setLineDash(dashPatterns[tokenIndex % dashPatterns.length]);
      targetCtx.beginPath();
      targetCtx.moveTo(x, underlineY);
      targetCtx.lineTo(x + width, underlineY);
      targetCtx.stroke();
      targetCtx.restore();
    }

    x += width;
    tokenIndex++;
  });

  targetCtx.textAlign = originalAlign;
}

function renderStoryFrame(targetCtx, width, height, text, localT, format="wide") {
  const mode = getDisplayMode();
  const highContrast = mode === "highContrast";
  drawField(targetCtx, width, height, localT, width / 1080);
  targetCtx.fillStyle = highContrast ? "rgba(0, 0, 0, .64)" : "rgba(8, 7, 12, .30)";
  targetCtx.fillRect(0, 0, width, height);

  const cardMargin = Math.round(width * 0.10);
  const cardW = width - cardMargin * 2;
  const cardH = height - Math.round(height * 0.28);
  const cardX = cardMargin;
  const cardY = Math.round(height * 0.14);
  const radius = Math.max(24, Math.round(width * 0.024));

  targetCtx.fillStyle = highContrast ? "rgba(0, 0, 0, .82)" : "rgba(8, 7, 12, .36)";
  targetCtx.strokeStyle = highContrast ? "rgba(255, 255, 255, .76)" : "rgba(248, 239, 226, .18)";
  targetCtx.lineWidth = Math.max(2, width * 0.0022);
  roundRect(targetCtx, cardX, cardY, cardW, cardH, radius, true, true);

  if (!highContrast) {
    const overlayGrad = targetCtx.createRadialGradient(
      width * .3, height * .25, width * .04,
      width * .65, height * .68, width * .85
    );
    overlayGrad.addColorStop(0, `hsla(${state.hue2}, 96%, 72%, .14)`);
    overlayGrad.addColorStop(1, `hsla(${state.hue}, 70%, 20%, 0)`);
    targetCtx.fillStyle = overlayGrad;
    roundRect(targetCtx, cardX, cardY, cardW, cardH, radius, true, false);
  }

  const titleSize = Math.round(width * (format === "vertical" ? 0.028 : 0.02));
  const textSize = Math.round(width * (format === "vertical" ? 0.048 : format === "square" ? 0.044 : 0.036));
  const metaSize = Math.round(width * (format === "vertical" ? 0.023 : 0.018));

  targetCtx.fillStyle = highContrast ? "#ffffff" : "rgba(248,239,226,.92)";
  targetCtx.textAlign = "center";
  targetCtx.textBaseline = "middle";
  targetCtx.font = `700 ${titleSize}px Courier New, monospace`;
  targetCtx.fillText("SpectraMuse", width / 2, cardY + titleSize * 1.4);

  targetCtx.font = `800 ${textSize}px Courier New, monospace`;
  const maxTextWidth = cardW * 0.78;
  const lines = wrapLines(targetCtx, text, maxTextWidth).slice(0, 14);
  const lineHeight = textSize * 1.32;
  const textBlockHeight = Math.max(lineHeight, lines.length * lineHeight);
  let startY = cardY + cardH / 2 - textBlockHeight / 2 + lineHeight * .12;

  targetCtx.shadowColor = highContrast ? "transparent" : "rgba(0,0,0,.60)";
  targetCtx.shadowBlur = highContrast ? 0 : width * 0.02;
  lines.forEach((ln, i) => {
    drawDisplayLine(targetCtx, ln, width / 2, startY + i * lineHeight, mode, textSize);
  });
  targetCtx.shadowBlur = 0;

  targetCtx.font = `700 ${metaSize}px Courier New, monospace`;
  targetCtx.fillStyle = "rgba(248,239,226,.78)";
  targetCtx.fillText(
    `${state.texture} / ${soundName.textContent}`,
    width / 2,
    cardY + cardH - metaSize * 1.8
  );
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function animate() {
  t += 0.008 + state.energy * 0.016;
  if (ctx) drawField(ctx, W, H, t, 1);

  if (activeRecorder && activeRecorder.ctx) {
    renderStoryFrame(
      activeRecorder.ctx,
      activeRecorder.canvas.width,
      activeRecorder.canvas.height,
      currentDisplayText,
      t,
      activeRecorder.format
    );
  }

  requestAnimationFrame(animate);
}

function sleep(ms) {

function buildAudioChain(audioCtx, options = {}) {

  const masterGain = audioCtx.createGain();
  const releaseVolumeGain = registerVolumeGain(masterGain, audioCtx);
  let outputNode = masterGain;
  let limiter = null;

  if (typeof audioCtx.createDynamicsCompressor === "function") {
    limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -8;
    limiter.knee.value = 12;
    limiter.ratio.value = 8;
    limiter.attack.value = 0.003;
    limiter.release.value = 0.18;
    masterGain.connect(limiter);
    outputNode = limiter;

  outputNode.connect(audioCtx.destination);

  let mediaDestination = null;
  if (capture) {
    if (typeof audioCtx.createMediaStreamDestination !== "function") {
      throw new Error(unsupportedMessages.recording);

    mediaDestination = audioCtx.createMediaStreamDestination();
    outputNode.connect(mediaDestination);
  }

  return {
    masterGain,
    mediaDestination,
    cleanup() {
      releaseVolumeGain();
      try { masterGain.disconnect(); } catch {}
      if (limiter) {
        try { limiter.disconnect(); } catch {}
      }
    }
  };
}

function connectSoundOutput(node, audioOut, audio) {

}

function shapeGain(gain, start, attack, hold, release, peak) {
  const end = start + attack + hold + release;
  gain.gain.cancelScheduledValues(start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(peak, start + attack);
  gain.gain.setValueAtTime(peak, start + attack + hold);
  gain.gain.exponentialRampToValueAtTime(0.0001, end);
  return end;
}

function createNoiseSource(audio, duration) {
  const sampleRate = audio.sampleRate || 44100;
  const frameCount = Math.max(1, Math.floor(sampleRate * duration));
  const buffer = audio.createBuffer(1, frameCount, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < frameCount; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const source = audio.createBufferSource();
  source.buffer = buffer;
  return source;
}

function playWordSound(word, offset=0, audioCtx=null, audioOut=null) {
  const AudioContext = getAudioContextConstructor();
  if (!AudioContext) return;
  const ownsAudio = !audioCtx;
  const audio = audioCtx || new AudioContext();
  const transientChain = ownsAudio && !audioOut ? buildAudioChain(audio) : null;
  const outputNode = audioOut || (transientChain ? transientChain.masterGain : audio.destination);
  const clean = cleanWord(word) || "story";
  const h = hashWord(clean);
  const root = 140 + (h % 520);
  const now = audio.currentTime + offset;
  const chars = clean.split("").slice(0, 14);
  const soundMode = getSelectedSoundMode();
  const softFeel = state.softness > state.sharpness;
  let longestEnd = now;

  chars.forEach((ch, i) => {
    const code = Math.max(1, ch.charCodeAt(0) - 96);
    const pitch = root + code * (softFeel ? 5 : 9) + (i % 5) * (24 + state.sharpness * 18);
    const start = now + i * (soundMode === "deepDrone" || soundMode === "velvetPad" || soundMode === "oceanWash" || soundMode === "auroraChoir" ? .085 : .045);

    if (soundMode === "museBell") {
      const osc = audio.createOscillator();
      const overtone = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = "sine";
      overtone.type = "triangle";
      osc.frequency.setValueAtTime(pitch * 1.6, start);
      overtone.frequency.setValueAtTime(pitch * 2.41, start);
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(900 + state.lightness * 16 + code * 18, start);
      filter.Q.value = 4 + state.softness * 4;
      osc.connect(filter);
      overtone.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .018, .02, .62 + state.softness * .25, .025 + state.energy * .025);
      osc.start(start);
      overtone.start(start);
      osc.stop(end);
      overtone.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else if (soundMode === "deepDrone") {
      const osc = audio.createOscillator();
      const sub = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = softFeel ? "sine" : "triangle";
      sub.type = "sine";
      osc.frequency.setValueAtTime(pitch * .34, start);
      sub.frequency.setValueAtTime(pitch * .17, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(260 + state.lightness * 8, start);
      osc.connect(filter);
      sub.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .16, .36, .72 + state.softness * .38, .026 + state.energy * .018);
      osc.start(start);
      sub.start(start);
      osc.stop(end);
      sub.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else if (soundMode === "crystalPluck") {
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = state.sharpness > state.softness ? "square" : "triangle";
      osc.frequency.setValueAtTime(pitch * 2.1, start);
      filter.type = "highpass";
      filter.frequency.setValueAtTime(650 + code * 24, start);
      osc.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .006, .018, .18 + state.softness * .12, .032 + state.energy * .035);
      osc.start(start);
      osc.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else if (soundMode === "staticPulse") {
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = "square";
      osc.frequency.setValueAtTime(pitch * (1.5 + (i % 3) * .35), start);
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(900 + code * 45 + state.energy * 850, start);
      filter.Q.value = 8 + state.sharpness * 7;
      osc.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .003, .015, .07 + state.sharpness * .04, .026 + state.energy * .03);
      osc.start(start);
      osc.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else if (soundMode === "velvetPad") {
      const osc = audio.createOscillator();
      const second = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = "sine";
      second.type = "triangle";
      osc.frequency.setValueAtTime(pitch * .74, start);
      second.frequency.setValueAtTime(pitch * .99, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(500 + state.lightness * 12, start);
      osc.connect(filter);
      second.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .26 + state.softness * .12, .22, .68, .022 + state.energy * .018);
      osc.start(start);
      second.start(start);
      osc.stop(end);
      second.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else if (soundMode === "typewriterPercussion") {
      const click = createNoiseSource(audio, .09);
      const clickGain = audio.createGain();
      const clickFilter = audio.createBiquadFilter();
      clickFilter.type = "highpass";
      clickFilter.frequency.setValueAtTime(1100 + code * 25, start);
      click.connect(clickFilter);
      clickFilter.connect(clickGain);
      connectSoundOutput(clickGain, outputNode, audio);
      const clickEnd = shapeGain(clickGain, start, .002, .012, .045, .03 + state.sharpness * .035);
      click.start(start);
      click.stop(clickEnd);

      const osc = audio.createOscillator();
      const toneGain = audio.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(pitch * 1.25, start + .008);
      osc.connect(toneGain);
      connectSoundOutput(toneGain, outputNode, audio);
      const toneEnd = shapeGain(toneGain, start + .008, .004, .018, .09 + state.softness * .06, .012 + state.energy * .015);
      osc.start(start + .008);
      osc.stop(toneEnd);
      longestEnd = Math.max(longestEnd, clickEnd, toneEnd);
    } else if (soundMode === "oceanWash") {
      const osc = audio.createOscillator();
      const lfo = audio.createOscillator();
      const lfoGain = audio.createGain();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      osc.type = "sine";
      lfo.type = "sine";
      osc.frequency.setValueAtTime(pitch * .55, start);
      lfo.frequency.setValueAtTime(.7 + (h % 9) * .08, start);
      lfoGain.gain.setValueAtTime(70 + state.softness * 55, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(450 + code * 18, start);
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);
      osc.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .18, .26, .62 + state.softness * .32, .02 + state.energy * .018);
      osc.start(start);
      lfo.start(start);
      osc.stop(end);
      lfo.stop(end);
      longestEnd = Math.max(longestEnd, end);
    } else {
      const rootTone = audio.createOscillator();
      const fifth = audio.createOscillator();
      const octave = audio.createOscillator();
      const third = audio.createOscillator();
      const gain = audio.createGain();
      const filter = audio.createBiquadFilter();
      rootTone.type = "sine";
      fifth.type = "triangle";
      octave.type = "sine";
      third.type = "sine";
      const choirRoot = Math.max(170, Math.min(420, pitch * .64));
      rootTone.frequency.setValueAtTime(choirRoot, start);
      fifth.frequency.setValueAtTime(choirRoot * 1.5, start);
      octave.frequency.setValueAtTime(choirRoot * 2, start);
      third.frequency.setValueAtTime(choirRoot * 1.25, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(700 + state.lightness * 10 + state.softness * 180, start);
      filter.Q.value = 0.8 + state.softness * 1.2;
      rootTone.connect(filter);
      fifth.connect(filter);
      octave.connect(filter);
      third.connect(filter);
      filter.connect(gain);
      connectSoundOutput(gain, outputNode, audio);
      const end = shapeGain(gain, start, .18 + state.softness * .08, .28, .72 + state.softness * .28, .016 + state.energy * .012);
      rootTone.start(start);
      fifth.start(start);
      octave.start(start);
      third.start(start);
      rootTone.stop(end);
      fifth.stop(end);
      octave.stop(end);
      third.stop(end);
      longestEnd = Math.max(longestEnd, end);
    }
  });

  if (ownsAudio) {
    setTimeout(() => {
      if (transientChain) transientChain.cleanup();
      audio.close();
    }, Math.max(1500, (longestEnd - now + .2) * 1000));
  }
}

function updateFromTyping() {
  const text = storyInput.value;
  const words = getWords(text);
  const last = words[words.length - 1] || "story";
  analyze(last);
  const scenes = getScenes(text);
  currentDisplayText = scenes[scenes.length - 1] || "Your living story will appear here.";
  renderLineDisplayText(currentDisplayText);
  statusEl.textContent = `${words.length} words / ${scenes.length} scenes`;
}

function getFormatDims(format) {
  return {
    vertical: [1080, 1920],
    square: [1080, 1080],
    wide: [1920, 1080]
  }[format] || [1920, 1080];
}

async function startRecorder(format, audio) {
  if (!featureSupport.recording) throw new Error(unsupportedMessages.recording);
  if (!audio) throw new Error(unsupportedMessages.audioStart);

  const [rw, rh] = getFormatDims(format);
  const recordCanvas = document.createElement("canvas");
  recordCanvas.width = rw;
  recordCanvas.height = rh;
  const rctx = recordCanvas.getContext("2d");
  if (!rctx) throw new Error(unsupportedMessages.canvasExport);

  const chain = buildAudioChain(audio, { capture: true });
  if (!chain.mediaDestination) throw new Error(unsupportedMessages.recording);

  const stream = recordCanvas.captureStream(30);
  chain.mediaDestination.stream.getAudioTracks().forEach(track => stream.addTrack(track));

  let mimeType = "";
  const mimeOptions = [
    "video/webm;codecs=vp9,opus",
    "video/webm;codecs=vp8,opus",
    "video/webm"
  ];
  for (const type of mimeOptions) {
    if (typeof MediaRecorder.isTypeSupported !== "function" || MediaRecorder.isTypeSupported(type)) {
      mimeType = type;
      break;
    }
  }

  const chunks = [];
  const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  recorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  const stopped = new Promise((resolve, reject) => {
    recorder.onerror = event => reject(event.error || new Error("Recording failed."));
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mimeType || "video/webm" });
      lastRecordedBlob = blob;
      const url = URL.createObjectURL(blob);
      triggerDownload(url, `spectramuse-${format}.webm`);
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      resolve(blob);
    };
  });

  recorder.start(250);

  activeRecorder = {
    recorder,
    audioOut: chain.masterGain,
    chain,
    canvas: recordCanvas,
    ctx: rctx,
    format,
    stopped
  };
  activeRecordingMode = true;
  statusEl.textContent = `Recording ${format} video...`;
  return activeRecorder;
}

async function stopRecorder() {
  if (!activeRecorder) return null;
  const local = activeRecorder;
  activeRecorder = null;
  activeRecordingMode = false;
  try {
    if (local.recorder.state !== "inactive") local.recorder.stop();
  } catch {}
  try {
    const blob = await local.stopped;
    statusEl.textContent = "Recording saved as .webm";
    return blob;
  } finally {
    if (local.chain) local.chain.cleanup();
  }
}

async function performStory(options = {}) {
  const { currentOnly = false, record = false } = options;
  if (!requireFeature("audioStart")) return;
  if (record && !requireFeature("recording")) return;

  const text = storyInput.value.trim();
  if (!text) {
    statusEl.textContent = "Write a story first.";
    return;
  }
  if (isPerforming) {
    statusEl.textContent = "Already performing.";
    return;
  }

  const token = ++performanceToken;
  isPerforming = true;
  refreshActionAvailability();

  const scenes = currentOnly ? [getScenes(text).slice(-1)[0]] : getScenes(text);
  let audio = null;
  let outputChain = null;

  try {
    audio = await createStartedAudioContext();
    let outputNode = null;
    if (record) {
      const rec = await startRecorder(formatSelect.value, audio);
      outputNode = rec.audioOut;
    } else {
      outputChain = buildAudioChain(audio);
      outputNode = outputChain.masterGain;
    }

    for (let s = 0; s < scenes.length; s++) {
      if (token !== performanceToken) break;
      const scene = scenes[s];
      const words = getWords(scene);
      currentDisplayText = scene;
      renderLineDisplayText(scene);

      for (let i = 0; i < words.length; i++) {
        if (token !== performanceToken) break;
        const w = words[i];
        analyze(w);
        playWordSound(w, 0, audio, outputNode);
        statusEl.textContent = `${record ? "Recording" : "Performing"} scene ${s + 1}/${scenes.length}: ${w}`;
        await sleep(360);
      }
      await sleep(420);
    }

    statusEl.textContent = record ? "Finalizing video..." : "Performance complete.";
    await sleep(700);
  } catch (error) {
    const failedFeature = !audio ? "audioStart" : record ? "recording" : "audioStart";
    const failureMessage = record
      ? "Recording could not start in this browser."
      : "Audio could not start in this browser.";
    markFeatureUnsupported(failedFeature, failureMessage);
  } finally {
    if (record) {
      try { await stopRecorder(); } catch {}
    }
    if (outputChain) outputChain.cleanup();
    try { if (audio) await audio.close(); } catch {}
    isPerforming = false;
    refreshActionAvailability();
  }
}

function stopPerformance() {
  performanceToken++;
  isPerforming = false;
  stopRecorder().catch(() => {
    statusEl.textContent = "Recording could not be finalized in this browser.";
  });
  refreshActionAvailability();
  statusEl.textContent = "Stopped.";
}

function triggerDownload(url, filename) {
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function download(filename, text, type="text/plain") {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  triggerDownload(url, filename);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function captionText() {
  const text = storyInput.value.trim();
  return `${text}

Made with SpectraMuse — where stories become color, sound, and motion.

#SpectraMuse #DigitalStorytelling #VisualPoetry #SoundArt`;
}

function makeStoryboardText() {
  const scenes = getScenes(storyInput.value.trim());
  if (!scenes.length) return "No storyboard yet.";
  return scenes.map((scene, i) => `Scene ${i + 1}: ${scene}`).join("\n\n");
}

copyButton.addEventListener("click", async () => {
  if (!requireFeature("clipboard")) return;
  try {
    await navigator.clipboard.writeText(captionText());
    statusEl.textContent = "Caption copied.";
  } catch {
    markFeatureUnsupported("clipboard", "Clipboard write was blocked here. Download the story text instead.");
  }
});

downloadTextButton.addEventListener("click", () => {
  download("spectramuse-story.txt", captionText());
  statusEl.textContent = "Story text downloaded.";
});

downloadStoryboardButton.addEventListener("click", () => {
  download("spectramuse-storyboard.txt", makeStoryboardText());
  statusEl.textContent = "Storyboard downloaded.";
});

downloadImageButton.addEventListener("click", () => {
  if (!requireFeature("canvasExport")) return;
  const format = formatSelect.value;
  const dims = getFormatDims(format);
  const out = document.createElement("canvas");
  out.width = dims[0];
  out.height = dims[1];
  const c = out.getContext("2d");
  renderStoryFrame(c, out.width, out.height, currentDisplayText, t, format);

  try {
    const url = out.toDataURL("image/png");
    triggerDownload(url, `spectramuse-${format}.png`);
    statusEl.textContent = "Visual card saved.";
  } catch {
    markFeatureUnsupported("canvasExport", "Canvas image export failed in this browser.");
  }
});

playButton.addEventListener("click", () => performStory({ currentOnly: false, record: false }));
sceneButton.addEventListener("click", () => performStory({ currentOnly: true, record: false }));
recordButton.addEventListener("click", () => performStory({ currentOnly: false, record: true }));
performAndSaveSceneButton.addEventListener("click", () => performStory({ currentOnly: true, record: true }));
stopRecordButton.addEventListener("click", stopPerformance);
muteButton.addEventListener("click", () => {
  audioSettings.muted = !audioSettings.muted;
  updateAudioSettings();
  statusEl.textContent = audioSettings.muted ? "Sound muted." : `Sound restored at ${getVolumePercent()}%.`;
});
volumeSlider.addEventListener("input", () => {
  audioSettings.volume = clampNumber(Number(volumeSlider.value) / 100, MIN_VOLUME, MAX_VOLUME, DEFAULT_VOLUME);
  if (audioSettings.muted && audioSettings.volume > 0) audioSettings.muted = false;
  updateAudioSettings();
  statusEl.textContent = `Volume set to ${getVolumePercent()}%.`;
});
setupButton.addEventListener("click", event => {
  event.stopPropagation();
  toggleSetupDropdown();
});
setupDropdown.addEventListener("click", event => {
  event.stopPropagation();
});
document.addEventListener("click", event => {
  if (!isSetupDropdownOpen()) return;
  if (setupDropdown.contains(event.target) || setupButton.contains(event.target)) return;
  closeSetupDropdown();
});
document.addEventListener("keydown", event => {
  if (event.key === "Escape" && isSetupDropdownOpen()) closeSetupDropdown();
});

clearButton.addEventListener("click", () => {
  storyInput.value = "";
  updateFromTyping();
  currentDisplayText = "Your living story will appear here.";
  renderLineDisplayText(currentDisplayText);
  statusEl.textContent = "Cleared.";
});

loadSampleButton.addEventListener("click", () => {
  storyInput.value = `The moon opened like a silver eye.
Moss climbed the old stone door.
Thunder wrote its name across the sky.
A field of glass answered in blue fire.`;
  updateFromTyping();
  statusEl.textContent = "Sample loaded.";
});

storyInput.addEventListener("input", updateFromTyping);
displayModeSelect.addEventListener("change", () => {
  updateDisplayMode(displayModeSelect.value);
  statusEl.textContent = `Text mode set to ${DISPLAY_MODES[getDisplayMode()]}.`;
});
soundModeSelect.addEventListener("change", updateSoundReadout);

storyInput.value = `The moon opened like a silver eye.
Moss climbed the old stone door.
Thunder wrote its name across the sky.
A field of glass answered in blue fire.`;
updateAudioSettings({ persist: false });
updateDisplayMode(displayMode, { persist: false });
updateFromTyping();
refreshActionAvailability();
showInitialCompatibilityStatus();
</script>
