# Cloudflare Workers static asset deployment for SpectraMuse
# Build first with: npm run build

name = "spectramuse"
compatibility_date = "2026-06-23"
workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[routes]]
pattern = "spectramuse.com/*"
zone_name = "spectramuse.com"

[[routes]]
pattern = "www.spectramuse.com/*"
zone_name = "spectramuse.com"
